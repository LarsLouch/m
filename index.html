<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff3d71" />
    <title>Eu te amo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        align-items: center;
        background: #250018;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100svh;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        inset: -20%;
        pointer-events: none;
        position: fixed;
      }

      body::before {
        animation: ambient-shift 13s ease-in-out infinite alternate;
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 90, 137, 0.42), transparent 24rem),
          radial-gradient(circle at 78% 72%, rgba(255, 26, 94, 0.26), transparent 27rem),
          linear-gradient(145deg, #230019, #720038 52%, #26001e);
      }

      body::after {
        background-image: radial-gradient(rgba(255, 228, 238, 0.7) 1px, transparent 1px);
        background-size: 3.5rem 3.5rem;
        mask-image: radial-gradient(circle at center, black, transparent 72%);
        opacity: 0.18;
      }

      #particle-field {
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        position: fixed;
      }

      .particle {
        animation: drift var(--duration) ease-in-out var(--delay) infinite alternate;
        color: rgba(255, 224, 235, var(--opacity));
        font-size: var(--size);
        left: var(--x);
        position: absolute;
        top: var(--y);
        user-select: none;
      }

      .particle.burst {
        animation: burst 1s cubic-bezier(.13, .7, .25, 1) forwards;
        left: var(--burst-x);
        top: var(--burst-y);
        opacity: 1;
      }

      main {
        --pointer-x: 0px;
        --pointer-y: 0px;
        display: grid;
        gap: 0.75rem;
        justify-items: center;
        max-width: 56rem;
        padding: clamp(1.5rem, 5vw, 3.5rem);
        position: relative;
        text-align: center;
        width: 100%;
      }

      main::before {
        background: radial-gradient(circle, rgba(255, 239, 246, 0.24), transparent 66%);
        content: "";
        height: 28rem;
        pointer-events: none;
        position: absolute;
        transform: translate(var(--pointer-x), var(--pointer-y));
        transition: transform 180ms ease-out;
        width: 28rem;
        z-index: -1;
      }

      .eyebrow {
        color: #ffd2e2;
        font-size: clamp(0.75rem, 2vw, 0.95rem);
        letter-spacing: 0.23em;
        margin: 0;
        text-transform: uppercase;
      }

      h1 {
        color: #fff8fb;
        font-size: clamp(3.4rem, 11vw, 7.8rem);
        letter-spacing: 0.06em;
        line-height: 0.95;
        margin: 0.15rem 0 0;
        max-width: 13ch;
        text-shadow: 0 0 1.6rem rgba(255, 222, 235, 0.76);
      }

      h1.long-copy {
        font-size: clamp(1.6rem, 4.6vw, 3.55rem);
        letter-spacing: 0.02em;
        line-height: 1.07;
        max-width: 21ch;
      }

      h1.is-changing,
      .message.is-changing,
      .heart-wrap.is-changing {
        animation: reveal 550ms cubic-bezier(.2, .9, .25, 1) both;
      }

      .message {
        color: #ffe0eb;
        font-size: clamp(1rem, 2.8vw, 1.3rem);
        margin: 0.25rem 0 1.35rem;
        min-height: 1.5em;
      }

      .heart-wrap {
        align-items: center;
        background: transparent;
        border: 0;
        color: inherit;
        cursor: pointer;
        display: grid;
        filter: drop-shadow(0 1.2rem 2.2rem rgba(48, 0, 30, 0.58));
        height: min(48vw, 18rem);
        justify-items: center;
        padding: 0;
        place-items: center;
        position: relative;
        width: min(52vw, 20rem);
      }

      .heart-wrap:focus-visible {
        border-radius: 50%;
        outline: 3px solid #fff4f8;
        outline-offset: 0.6rem;
      }

      .halo,
      .halo::before,
      .halo::after {
        border: 1px solid rgba(255, 222, 235, 0.25);
        border-radius: 50%;
        content: "";
        inset: 18%;
        pointer-events: none;
        position: absolute;
      }

      .halo { animation: ripple 2.7s ease-out infinite; }
      .halo::before { animation: ripple 2.7s ease-out 900ms infinite; }
      .halo::after { animation: ripple 2.7s ease-out 1800ms infinite; }

      .heart {
        animation: beat 1.15s ease-in-out infinite;
        background: linear-gradient(145deg, #ff9abc, #ff1c5b 54%, #b30045);
        height: 10rem;
        position: relative;
        transform: rotate(-45deg);
        width: 10rem;
        z-index: 1;
      }

      .heart::before,
      .heart::after {
        background: inherit;
        border-radius: 50%;
        content: "";
        height: 10rem;
        position: absolute;
        width: 10rem;
      }

      .heart::before { left: 0; top: -5rem; }
      .heart::after { left: 5rem; top: 0; }

      .heart.emoji {
        align-items: center;
        animation: emoji-pop 1.15s ease-in-out infinite;
        background: none;
        display: flex;
        font-size: clamp(7rem, 24vw, 13rem);
        justify-content: center;
        transform: none;
      }

      .heart.emoji::before,
      .heart.emoji::after { display: none; }

      .love-button {
        backdrop-filter: blur(12px);
        background: rgba(255, 242, 247, 0.13);
        border: 1px solid rgba(255, 241, 247, 0.42);
        border-radius: 999px;
        color: #fff8fb;
        cursor: pointer;
        font: inherit;
        font-size: clamp(0.9rem, 2.3vw, 1rem);
        padding: 0.8rem 1.15rem;
        transition: background 180ms ease, transform 180ms ease;
      }

      .love-button:hover { background: rgba(255, 242, 247, 0.24); transform: translateY(-2px); }
      .love-button:active { transform: translateY(1px) scale(0.98); }
      .love-button:focus-visible { outline: 3px solid #fff4f8; outline-offset: 0.25rem; }
      .love-button span { display: inline-block; margin-right: 0.35rem; }

      .stage-indicator {
        display: flex;
        gap: 0.45rem;
        margin-top: 0.7rem;
      }

      .stage-indicator span {
        background: rgba(255, 229, 239, 0.32);
        border-radius: 999px;
        height: 0.35rem;
        transition: background 280ms ease, transform 280ms ease, width 280ms ease;
        width: 0.35rem;
      }

      .stage-indicator span.active {
        background: #fff2f7;
        transform: scale(1.12);
        width: 1.45rem;
      }

      .sr-only {
        height: 1px;
        margin: -1px;
        overflow: hidden;
        padding: 0;
        position: absolute;
        width: 1px;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      @keyframes ambient-shift {
        from { transform: scale(1) rotate(0deg); }
        to { transform: scale(1.1) rotate(3deg); }
      }

      @keyframes drift {
        from { opacity: calc(var(--opacity) * 0.5); transform: translateY(0) rotate(-8deg); }
        to { opacity: var(--opacity); transform: translateY(-2rem) rotate(12deg); }
      }

      @keyframes burst {
        from { opacity: 1; transform: translate(-50%, -50%) scale(0.55) rotate(0deg); }
        to { opacity: 0; transform: translate(calc(-50% + var(--move-x)), calc(-50% + var(--move-y))) scale(1.25) rotate(var(--spin)); }
      }

      @keyframes beat {
        0%, 100% { transform: rotate(-45deg) scale(0.93); }
        14% { transform: rotate(-45deg) scale(1.08); }
        28% { transform: rotate(-45deg) scale(0.96); }
        42% { transform: rotate(-45deg) scale(1.12); }
        58% { transform: rotate(-45deg) scale(0.98); }
      }

      @keyframes emoji-pop {
        0%, 100% { transform: scale(0.94) rotate(-3deg); }
        50% { transform: scale(1.08) rotate(3deg); }
      }

      @keyframes ripple {
        0% { opacity: 0.64; transform: scale(0.82); }
        100% { opacity: 0; transform: scale(1.55); }
      }

      @keyframes reveal {
        from { filter: blur(5px); opacity: 0; transform: translateY(0.55rem) scale(0.98); }
        to { filter: blur(0); opacity: 1; transform: translateY(0) scale(1); }
      }

      @media (max-width: 480px) {
        main { gap: 0.45rem; padding: 1.35rem; }
        h1.long-copy { font-size: clamp(1.35rem, 6.4vw, 2.1rem); }
        .message { margin-bottom: 0.75rem; }
        .heart { height: 7.5rem; width: 7.5rem; }
        .heart::before, .heart::after { height: 7.5rem; width: 7.5rem; }
        .heart::before { top: -3.75rem; }
        .heart::after { left: 3.75rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div id="particle-field" aria-hidden="true"></div>
    <main id="love-experience" data-stage="love" aria-labelledby="love-title">
      <p class="eyebrow">Uma mensagem do coração</p>
      <h1 id="love-title" aria-live="polite">EU TE AMO</h1>
      <p class="message" id="love-message">Meu coração bate por você.</p>
      <button class="heart-wrap" id="heart-button" type="button" aria-label="Um coração vermelho pulsando. Toque para espalhar carinho.">
        <span class="halo" aria-hidden="true"></span>
        <span class="heart" id="symbol" aria-hidden="true"></span>
      </button>
      <button class="love-button" id="love-button" type="button"><span aria-hidden="true">♥</span>Toque para espalhar carinho</button>
      <div class="stage-indicator" aria-label="Etapa 1 de 3" id="stage-indicator">
        <span class="active"></span><span></span><span></span>
      </div>
      <p class="sr-only" id="interaction-status" aria-live="polite"></p>
    </main>
    <script>
      const stages = [
        { key: "love", title: "EU TE AMO", message: "Meu coração bate por você.", symbol: "", symbolLabel: "Um coração vermelho pulsando", duration: 3000 },
        { key: "sorry", title: "ME PERDOA, POR FAVOR!", message: "Eu sinto muito.", symbol: "😔", symbolLabel: "Um emoji triste demonstrando arrependimento", duration: 3000 },
        { key: "plea", title: "Eu realmente queria namorar com você e ser só seu. Eu nunca mais erro, eu prometo de verdade!", message: "Me dá uma segunda chance?", symbol: "🥺", symbolLabel: "Um emoji implorando por uma segunda chance", duration: 6000 },
      ];

      const experience = document.getElementById("love-experience");
      const field = document.getElementById("particle-field");
      const title = document.getElementById("love-title");
      const message = document.getElementById("love-message");
      const symbol = document.getElementById("symbol");
      const heartButton = document.getElementById("heart-button");
      const loveButton = document.getElementById("love-button");
      const indicator = document.getElementById("stage-indicator");
      const status = document.getElementById("interaction-status");
      let stageIndex = 0;
      let cycleTimer;
      let resetButtonTimer;

      function addParticle(index) {
        const particle = document.createElement("span");
        particle.className = "particle";
        particle.textContent = index % 5 === 0 ? "✦" : "♥";
        particle.style.setProperty("--x", `${(index * 37) % 100}%`);
        particle.style.setProperty("--y", `${(index * 61 + 8) % 94}%`);
        particle.style.setProperty("--size", `${0.7 + (index % 5) * 0.18}rem`);
        particle.style.setProperty("--duration", `${3.4 + (index % 6) * 0.55}s`);
        particle.style.setProperty("--delay", `${-(index % 7) * 0.6}s`);
        particle.style.setProperty("--opacity", `${0.24 + (index % 4) * 0.13}`);
        field.appendChild(particle);
      }

      function createBurst(clientX, clientY) {
        const rect = field.getBoundingClientRect();
        const x = `${((clientX - rect.left) / rect.width) * 100}%`;
        const y = `${((clientY - rect.top) / rect.height) * 100}%`;
        for (let index = 0; index < 18; index += 1) {
          const particle = document.createElement("span");
          const angle = (Math.PI * 2 * index) / 18;
          const distance = 4 + (index % 4) * 1.65;
          particle.className = "particle burst";
          particle.textContent = index % 4 === 0 ? "✦" : "♥";
          particle.style.setProperty("--burst-x", x);
          particle.style.setProperty("--burst-y", y);
          particle.style.setProperty("--move-x", `${Math.cos(angle) * distance}rem`);
          particle.style.setProperty("--move-y", `${Math.sin(angle) * distance}rem`);
          particle.style.setProperty("--spin", `${index % 2 === 0 ? 1 : -1}turn`);
          particle.style.setProperty("--size", `${0.8 + (index % 3) * 0.2}rem`);
          field.appendChild(particle);
          particle.addEventListener("animationend", () => particle.remove(), { once: true });
        }
      }

      function animateChange() {
        [title, message, heartButton].forEach((element) => {
          element.classList.remove("is-changing");
          void element.offsetWidth;
          element.classList.add("is-changing");
        });
      }

      function showStage() {
        const stage = stages[stageIndex];
        experience.dataset.stage = stage.key;
        title.textContent = stage.title;
        title.classList.toggle("long-copy", stage.key === "plea");
        message.textContent = stage.message;
        symbol.textContent = stage.symbol;
        symbol.classList.toggle("emoji", stage.symbol !== "");
        heartButton.setAttribute("aria-label", `${stage.symbolLabel}. Toque para espalhar carinho.`);
        indicator.setAttribute("aria-label", `Etapa ${stageIndex + 1} de ${stages.length}`);
        [...indicator.children].forEach((dot, index) => dot.classList.toggle("active", index === stageIndex));
        document.title = stage.title;
        animateChange();
        window.clearTimeout(cycleTimer);
        cycleTimer = window.setTimeout(() => {
          stageIndex = (stageIndex + 1) % stages.length;
          showStage();
        }, stage.duration);
      }

      function spreadLove(event) {
        const rect = heartButton.getBoundingClientRect();
        const x = event?.clientX || rect.left + rect.width / 2;
        const y = event?.clientY || rect.top + rect.height / 2;
        createBurst(x, y);
        status.textContent = "Carinho espalhado.";
        loveButton.innerHTML = '<span aria-hidden="true">✦</span>Carinho enviado!';
        window.clearTimeout(resetButtonTimer);
        resetButtonTimer = window.setTimeout(() => {
          loveButton.innerHTML = '<span aria-hidden="true">♥</span>Toque para espalhar carinho';
        }, 1600);
      }

      heartButton.addEventListener("click", spreadLove);
      loveButton.addEventListener("click", spreadLove);
      experience.addEventListener("pointermove", (event) => {
        const rect = experience.getBoundingClientRect();
        experience.style.setProperty("--pointer-x", `${(event.clientX - rect.left - rect.width / 2) * 0.045}px`);
        experience.style.setProperty("--pointer-y", `${(event.clientY - rect.top - rect.height / 2) * 0.045}px`);
      });
      experience.addEventListener("pointerleave", () => {
        experience.style.setProperty("--pointer-x", "0px");
        experience.style.setProperty("--pointer-y", "0px");
      });

      for (let index = 0; index < 28; index += 1) addParticle(index);
      showStage();
    </script>
  </body>
</html>
